<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #28a745; /* Зеленый фон */
            color: white; /* Белый текст */
            padding-top: 50px; /* Отступ сверху */
        }
        .search-form {
            background-color: rgba(255, 255, 255, 0.2); /* Прозрачный белый фон */
            border-radius: 10px; /* Скругление углов */
            padding: 20px;
        }
        .page-title {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">Мониторинг IT команды в режиме реального времени</h1>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form class="search-form">
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Введите запрос">
                    </div>
                    <div class="form-group">
                        <select class="form-control">
                            <option selected disabled>Выберите категорию</option>
                            <option>Программное обеспечение</option>
                            <option>Обучение и развитие персонала</option>
                            <option>Системы контроля версий</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="priceRange">Фильтр по цене:</label>
                        <input type="range" class="form-control-range" id="priceRange" min="0" max="1000" step="10">
                    </div>
                    <button type="submit" class="btn btn-lg btn-block btn-success">Найти</button>
                </form>
            </div>
        </div>
        <div class="row justify-content-center mt-4">
            <div class="col-md-8">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Название</th>
                            <th>Цена</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- рез поиска -->
                        <!-- строк таблицы: -->
                        <tr>
                            <td>Программа управления задачами</td>
                            <td>200</td>
                        </tr>
                        <tr>
                            <td>Курс обучения DevOps</td>
                            <td>500</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
