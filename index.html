<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cummy Animation</title>
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<style>
    .pink-text {
      color: #ff80bf;
    }

    body {
        background-color: #ffe6f2; /* Нежно-розовый фон */
        position: relative;
    }

    .container {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    #text {
        font-size: 3em;
        margin-bottom: 2em;
        position: relative;
    }

    .btn-cummy {
        background-color: #ff80bf; /* Розовая кнопка */
        color: white;
        border: none;
    }

    .btn-cummy:hover {
        background-color: #ff99cc; /* При наведении блестит */
    }

    .drop {
        position: absolute;
        color: white;
        font-size: 2em;
        opacity: 0;
        transform-origin: center bottom;
    }
</style>
</head>
<body>
<div class="container">
    <div id="text">c==3</div>
    <button id="btn" class="btn btn-cummy">Cummy</button>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
    $(document).ready(function(){
        $("#btn").click(function(){
            var cPosition = $("#text").position();
            for (let i = 0; i < 50; i++) {
                let drop = $("<div class='drop'>•</div>");
                drop.css({
                    left: cPosition.left + $("#text").width() / 180, // Расположение относительно 'c'
                    top: cPosition.top + $("#text").height() / 3
                });
                $("body").append(drop);
                animateDrop(drop);
            }
        });

        function animateDrop(drop) {
            let startX = drop.position().left;
            let startY = drop.position().top;
            let endX = startX - Math.random() * 100 - 50;
            let endY = startY + Math.random() * 100 + 50;
            let duration = Math.random() * 1000 + 1000; // Случайная длительность анимации
            drop.animate({
                left: endX,
                top: endY,
                opacity: 1,
                width: '0px',
                height: '0px'
            }, duration, function(){
                $(this).remove();
            });
        }
    });
</script>
<footer class="container-fluid text-center">
    <p class="pink-text">Для Карины</p>
  </footer>
</body>
</html>
