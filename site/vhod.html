<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #28a745; 
            color: white; 
            padding-top: 50px; 
        }
        .login-form {
            background-color: rgba(255, 255, 255, 0.2); 
            border-radius: 10px; 
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="text-center mb-4">
                    <img src="imgs/full_logo.png" alt="Логотип" class="img-fluid">
                    <h2 class="mt-3 mb-4">Пожалуйста, войдите в систему</h2>
                </div>
                <form class="login-form">
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Логин">
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control" placeholder="Пароль">
                    </div>
                    <div class="form-group form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Запомнить меня</label>
                    </div>
                    <button type="button" class="btn btn-lg btn-block btn-success" onclick="redirectToKabinet()">Вход</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        function redirectToKabinet() {
            window.location.href = 'kabinet.html'; // Переход на страницу личного кабинета при нажатии на кнопку "Вход"
        }
    </script>
</body>
</html>
