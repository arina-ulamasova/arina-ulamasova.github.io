<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поисковые формы</title>
</head>
<body>
    <div class="container">
        <h2>Поисковые формы</h2>
        <form action="https://www.yandex.ru/search/" method="GET" target="_blank">
            <label for="yandex_query">Yandex:</label>
            <input type="text" id="yandex_query" name="text" placeholder="Поиск в Yandex">
            <button type="submit">Искать</button>
        </form>
        <form action="http://rambler.ru/cgi-bin/search" method="GET" target="_blank">
            <label for="rambler_query">Rambler:</label>
            <input type="text" id="rambler_query" name="query" placeholder="Поиск в Rambler">
            <button type="submit">Искать</button>
        </form>
        <form action="http://www.aport.ru/search" method="GET" target="_blank">
            <label for="aport_query">Aport:</label>
            <input type="text" id="aport_query" name="r" placeholder="Поиск в Aport">
            <button type="submit">Искать</button>
        </form>
        <form action="https://www.google.com/search" method="GET" target="_blank">
            <label for="google_query">Google:</label>
            <input type="text" id="google_query" name="q" placeholder="Поиск в Google">
            <button type="submit">Искать</button>
        </form>
        <form action="http://www.filesearch.ru/search.cgi" method="GET" target="_blank">
            <label for="filesearch_query">Filesearch:</label>
            <input type="text" id="filesearch_query" name="q" placeholder="Поиск в Filesearch">
            <button type="submit">Искать</button>
        </form>
    </div>
</body>
</html>
